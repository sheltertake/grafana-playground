services:
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.6.1
    ports:
      - "3200:3200"
    volumes:
      - ./configs/tempo.yaml:/etc/tempo.yaml
    command: -config.file=/etc/tempo.yaml

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - loki
      - tempo
      - prometheus

  alloy:
    image: grafana/alloy:latest
    ports:
      - "12345:12345"   # Alloy UI
      - "12347:12347"   # Faro receiver (browser → Alloy)
    volumes:
      - ./configs/alloy/config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
      - otel-collector

  dotnet-app:
    build: ./dotnet-app
    ports:
      - "8080:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=dotnet-app
      - BACKEND_URL=http://backend:8080
    depends_on:
      - otel-collector
      - backend

  backend:
    build: ./backend
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=backend
    depends_on:
      - otel-collector

  spa:
    build:
      context: ./spa
      args:
        VITE_API_URL: http://localhost:8080
        VITE_FARO_URL: http://localhost:12347/collect
    ports:
      - "5173:80"
    depends_on:
      - dotnet-app
      - alloy
